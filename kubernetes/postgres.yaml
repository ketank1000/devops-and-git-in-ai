apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    CREATE TABLE IF NOT EXISTS conversations (
        id         UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        created_at TIMESTAMPTZ  NOT NULL    DEFAULT NOW(),
        updated_at TIMESTAMPTZ  NOT NULL    DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS messages (
        id              UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        conversation_id UUID         NOT NULL REFERENCES conversations(id) ON DELETE CASCADE,
        role            VARCHAR(20)  NOT NULL CHECK (role IN ('user', 'assistant', 'system')),
        content         TEXT         NOT NULL,
        created_at      TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_messages_conversation ON messages(conversation_id);
    CREATE INDEX IF NOT EXISTS idx_messages_created_at  ON messages(created_at);

    CREATE OR REPLACE FUNCTION update_conversation_timestamp()
    RETURNS TRIGGER LANGUAGE plpgsql AS $$
    BEGIN
        UPDATE conversations SET updated_at = NOW() WHERE id = NEW.conversation_id;
        RETURN NEW;
    END;
    $$;

    DROP TRIGGER IF EXISTS trg_update_conversation ON messages;
    CREATE TRIGGER trg_update_conversation
        AFTER INSERT ON messages
        FOR EACH ROW EXECUTE FUNCTION update_conversation_timestamp();

    INSERT INTO conversations(id) VALUES ('00000000-0000-0000-0000-000000000001') ON CONFLICT DO NOTHING;
    INSERT INTO messages(conversation_id, role, content)
        VALUES ('00000000-0000-0000-0000-000000000001', 'assistant', 'Hello! I am TinyLlama. How can I help you today?')
        ON CONFLICT DO NOTHING;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "chatdb"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "chatdb"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-sql
          configMap:
            name: postgres-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
